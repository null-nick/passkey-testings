<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background: #fff
        }

        #s {
            color: #888;
            font-size: 14px;
            text-align: center
        }
    </style>
</head>

<body>
    <p id="s">Waiting...</p>
    <script>
        function b64u2buf(s) {
            s = s.replace(/-/g, '+').replace(/_/g, '/');
            while (s.length % 4) s += '=';
            var b = atob(s), a = new Uint8Array(b.length);
            for (var i = 0; i < b.length; i++)a[i] = b.charCodeAt(i);
            return a.buffer;
        }
        function buf2b64u(b) {
            var a = new Uint8Array(b), s = '';
            for (var i = 0; i < a.length; i++)s += String.fromCharCode(a[i]);
            return btoa(s).replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
        }
        function redirect(action, type, payload) {
            var uri = 'octopasskey://callback?action=' + encodeURIComponent(action) + '&' + type + '=' + encodeURIComponent(payload);
            window.location.href = uri;
        }
        async function doLogin(optionsJson) {
            try {
                document.getElementById('s').textContent = 'Authenticating...';
                var o = JSON.parse(optionsJson);
                o.challenge = b64u2buf(o.challenge);
                if (o.allowCredentials) o.allowCredentials = o.allowCredentials.map(function (c) { return { type: c.type, id: b64u2buf(c.id) } });
                var c = await navigator.credentials.get({ publicKey: o });
                var r = { id: c.id, rawId: buf2b64u(c.rawId), response: { clientDataJSON: buf2b64u(c.response.clientDataJSON), authenticatorData: buf2b64u(c.response.authenticatorData), signature: buf2b64u(c.response.signature), userHandle: c.response.userHandle ? buf2b64u(c.response.userHandle) : '' }, type: c.type };
                redirect('login', 'data', JSON.stringify(r));
            } catch (e) { redirect('login', 'error', e.name + ': ' + e.message) }
        }
        async function doRegistration(optionsJson) {
            try {
                document.getElementById('s').textContent = 'Registering...';
                var o = JSON.parse(optionsJson);
                o.challenge = b64u2buf(o.challenge);
                if (o.user && o.user.id) o.user.id = b64u2buf(o.user.id);
                if (o.excludeCredentials) o.excludeCredentials = o.excludeCredentials.map(function (c) { return { type: c.type, id: b64u2buf(c.id) } });
                var c = await navigator.credentials.create({ publicKey: o });
                var r = { id: c.id, rawId: buf2b64u(c.rawId), response: { clientDataJSON: buf2b64u(c.response.clientDataJSON), attestationObject: buf2b64u(c.response.attestationObject) }, type: c.type };
                redirect('register', 'data', JSON.stringify(r));
            } catch (e) { redirect('register', 'error', e.name + ': ' + e.message) }
        }
        window.startLogin = function (j) { doLogin(j) };
        window.startRegistration = function (j) { doRegistration(j) };
        (function () {
            var hash = window.location.hash;
            if (!hash || hash.length < 2) return;
            var params = {};
            hash.substring(1).split('&').forEach(function (p) {
                var kv = p.split('=');
                if (kv.length === 2) params[kv[0]] = decodeURIComponent(kv[1]);
            });
            var action = params['action'];
            var options = params['options'];
            if (!action || !options) return;
            try {
                var optionsJson = atob(options.replace(/-/g, '+').replace(/_/g, '/'));
            } catch (e) { redirect(action, 'error', 'Failed to decode options: ' + e.message); return }
            if (action === 'login') doLogin(optionsJson);
            else if (action === 'register') doRegistration(optionsJson);
            else redirect(action, 'error', 'Unknown action: ' + action);
        })();
    </script>
</body>

</html>
